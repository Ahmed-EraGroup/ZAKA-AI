<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZAKA Clone - Ahmed's Project</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <style>
    :root {
      --bg-primary: #05060B;
      --accent: #4B6BFF;
    }

    body {
      background-color: var(--bg-primary);
      color: #F4F6FF;
      font-family: "Inter", sans-serif;
      margin: 0;
    }

    .font-display { font-family: "Space Grotesk", sans-serif; }

    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(244, 246, 255, 0.08);
      border-radius: 28px;
    }
  </style>
</head>
<body>
  <main class="min-h-screen p-8">
    <section class="pinned glass-card p-8 mb-6 min-h-[60vh]">
      <h1 class="font-display text-3xl">ZAKA Clone - Ahmed's Project</h1>
    </section>
    <section class="pinned glass-card p-8 mb-6 min-h-[60vh]">
      <p>Demo section for GSAP ScrollTrigger pin effect.</p>
    </section>
    <section class="glass-card p-8 min-h-[60vh]">
      <p>Scroll down to test pin animation.</p>
    </section>
  </main>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    gsap.utils.toArray("section.pinned").forEach((section) => {
      ScrollTrigger.create({
        trigger: section,
        start: "top top",
        pin: true,
        scrub: 0.6,
        end: "+=130%"
      });
    });
  </script>
</body>
</html>
